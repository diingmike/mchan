<!DOCTYPE html>
<html lang = "en">
    <head>
        <title> Michael Chan </title>
        
        <meta charset = "UTF-8" />

        <meta name = "viewport" content = "width=device-width,initial-scale=1.0" />

        <!--custom CSS-->
        <link rel = "stylesheet" href = "css/style.css" />

        <!--font awesome link-->
        <link rel = "stylesheet" href = "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

        <!--google font, Inter-->
        <link rel = "preconnect" href = "https://fonts.googleapis.com" />

    <body>
        <!--header-->
        <header>
            <div class = "container">
                <!--hamburger-->
                <input type = "checkbox" id = "check" />

                    <i class = "fas fa-bars checkbtn-icon"></i>
                </label>

                <!--logo-->
                <div class = "logo">
                    <a href = "index.html"> 
                        <span class="logo_text"> m . <em> Chan </em> </span>
                    </a>
                </div>

                <!--menu-->
                <nav class = "menu">
                    <a href = "index.html" class = "nav_link">
                        <svg    class = "nav_icon" 
                                viewBox = "0 0 16 16" 
                                fill = "currentColor" 
                                aria-hidden = "true">
                                <path d = "M8 1.5L1 7.5V14h5v-4h4v4h5V7.5L8 1.5z" />
                        </svg>
                        Home
                    </a>
                    <a href = "projects.html" class = "nav_link active">
                        <svg    class = "nav_icon" 
                                viewBox = "0 0 16 16" 
                                fill = "currentColor" 
                                aria-hidden = "true">
                                <rect x = "1" y = "1" width = "6" height = "6" rx = "1" />
                                <rect x = "9" y = "1" width = "6" height = "6" rx = "1" />
                                <rect x = "1" y = "9" width = "6" height = "6" rx = "1" />
                                <rect  x = "9" y = "9" width = "6" height = "6" rx = "1" />
                        </svg>
                        Projects
                    </a>
                    <a href = "contact.html" class = "nav_link nav_link">
                        <svg    class = "nav_icon" 
                                viewBox = "0 0 16 16" 
                                fill = "currentColor" 
                                aria-hidden = "true">
                                <path d = "M1 3.5A1.5 1.5 0 0 1 2.5 2h11A1.5 1.5 0 0 1 15 3.5v9A1.5 1.5 0 0 1 13.5 14h-11A1.5 1.5 0 0 1 1 12.5v-9zm1.5-.5a.5.5 0 0 0-.5.5L8 8.75 14 3.5a.5.5 0 0 0-.5-.5h-11zM14 4.9l-5.5 4.4a.75.75 0 0 1-.94 0L2 4.9V12.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V4.9z" />

                        Contact
                    </a>
                </nav>
            </div>
        </header>
        <!--header ends-->

        <!--projects-->
		<section class = "projects">
		    <div class = "container">
		        <div class = "projects_inner">

		            <!--website samples-->
		            <div class = "project_category">
		                <div class = "project_cat_header">
		                    <span class = "project_cat_num"> 01 </span>
		                    <div class = "project_cat_rule"></div>
		                    <h2 class = "project_title"> Website Samples </h2>
		                </div>

		                <div class = "project_grid">

		                    <!--print shop-->
		                    <a href = "https://diingmike.github.io/print-shop/index.html" class = "project_card web_card">
		                        <div class = "web_card_top">
		                            <div class = "web_card_icon">
		                                <!--printer icon-->
		                                <svg 	viewBox = "0 0 24 24" 
		                                		fill = "none" 
		                                		aria-hidden = "true">
		                                    	<rect x = "4" y = "2" width = "16" height = "12" rx = "2" fill = "#430a4d" class = "icon_fill" />
		                                    	<rect x = "2" y = "10" width = "20" height = "9" rx = "2" stroke = "#430a4d" stroke-width = "1.5" class = "icon_stroke" fill = "none" />

		                                    	<rect x = "6" y = "16" width = "8" height = "1.5" rx = "0.75" fill = "#430a4d" class = "icon_fill" />
		                                </svg>
		                            </div>

		                            <div class = "web_card_arrow">
		                                <svg 	viewBox = "0 0 12 12" 
		                                		fill = "none" 
		                                		stroke = "#430a4d" 
		                                		stroke-width = "1.5" 
		                                		stroke-linecap = "round" 
		                                		stroke-linejoin = "round" 
		                                		class = "arrow_svg" 
		                                		aria-hidden = "true">
		                                    	<path d = "M2 10L10 2M4 2h6v6" />
		                                </svg>
		                            </div>
		                        </div>

		                        <div class = "web_card_text">
		                            <p class = "web_card_name"> Print Shop </p>
		                            <p class = "web_card_type"> Display Website </p>
		                        </div>
		                    </a>

		                    <!--corporate league-->
		                    <a href = "#" class = "project_card web_card">
		                        <div class = "web_card_top">
		                            <div class = "web_card_icon">
		                                <!--briefcase icon-->
		                                <svg 	viewBox = "0 0 24 24" 
		                                		fill = "none" 
		                                		aria-hidden = "true">
		                                    	<rect x = "3" y = "7" width = "18" height = "13" rx = "2" stroke = "#430a4d" stroke-width = "1.5" class = "icon_stroke" fill = "none" />
		                                    	<path d = "M8 7V5a4 4 0 0 1 8 0v2" stroke = "#430a4d" stroke-width = "1.5" stroke-linecap = "round" class = "icon_stroke" />
		                                    	<circle cx = "12" cy = "13" r = "2" fill = "#430a4d" class = "icon_fill" />
		                                </svg>
		                            </div>

		                            <div class = "web_card_arrow">
		                                <svg 	viewBox = "0 0 12 12" 
		                                		fill = "none" 
		                                		stroke = "#430a4d" 
		                                		stroke-width = "1.5" 
		                                		stroke-linecap = "round" 
		                                		stroke-linejoin = "round" 
		                                		class = "arrow_svg" 
		                                		aria-hidden = "true">
		                                    <path d = "M2 10L10 2M4 2h6v6" />
		                                </svg>
		                            </div>
		                        </div>

		                        <div class = "web_card_text">
		                            <p class = "web_card_name"> Corporate League </p>
		                            <p class = "web_card_type"> Display Website </p>
		                        </div>
		                    </a>

		                    <!--livezone print shop-->
		                    <a href = "#" class = "project_card web_card">
		                        <div class = "web_card_top">
		                            <div class = "web_card_icon">
		                                <!--globe/live icon-->
		                                <svg 	viewBox = "0 0 24 24" 
		                                		fill = "none" 
		                                		aria-hidden = "true">
		                                    	<circle cx = "12" cy = "12" r = "9" stroke = "#430a4d" stroke-width = "1.5" class = "icon_stroke" fill = "none" />
		                                    	<path d = "M12 7v5l3 3" stroke = "#430a4d" stroke-width = "1.5" stroke-linecap = "round" stroke-linejoin = "round" class = "icon_stroke" />
		                                    	<circle cx = "12" cy = "12" r = "1.5" fill = "#430a4d" class = "icon_fill" />
		                                </svg>
		                            </div>

		                            <div class = "web_card_arrow">
		                                <svg 	viewBox = "0 0 12 12" 
		                                		fill = "none" 
		                                		stroke = "#430a4d" 
		                                		stroke-width = "1.5" 
		                                		stroke-linecap = "round" 
		                                		stroke-linejoin = "round" 
		                                		class = "arrow_svg" 
		                                		aria-hidden = "true">
		                                    <path d = "M2 10L10 2M4 2h6v6" />
		                                </svg>
		                            </div>
		                        </div>

		                        <div class = "web_card_text">
		                            <p class = "web_card_name"> LiveZone Print Shop </p>
		                            <p class = "web_card_type"> Display Website </p>
		                        </div>
		                    </a>

		                </div>
		            </div>

		            <!--photos taken-->
		            <div class = "project_category">
		                <div class = "project_cat_header">
		                    <span class = "project_cat_num"> 02 </span>
		                    <div class = "project_cat_rule"></div>
		                    <h2 class = "project_title"> Photos Taken </h2>
		                </div>

		                <div class = "project_grid">

		                    <div class = "project_card photo_card">
		                        <div class = "card_image">
		                            <img src = "images/projects/photography/diing.jpg" alt = "Diing" />
		                        </div>
		                    </div>

		                    <div class = "project_card photo_card">
		                        <div class = "card_image">
		                            <img src = "images/projects/photography/art.jpg" alt = "Art" />
		                        </div>
		                    </div>

		                    <div class = "project_card photo_card">
		                        <div class = "card_image">
		                            <img src = "images/projects/photography/containers.jpg" alt = "Containers" />
		                        </div>
		                    </div>

		                </div>
		            </div>

		<!--footer-->
        <footer class = "footer">

                <div class = "footer_inner">
                    <p class = "footer_copy"> &copy; <span id = "year"></span> Michael Chan </p>
                    <p class = "footer_tagline"> Diamond in a rough </p>
                </div>
            </div>
        </footer>

        <script src = "js/script.js"></script>
